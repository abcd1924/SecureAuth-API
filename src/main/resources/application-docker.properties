spring.config.activate.on-profile=docker

# Docker-specific server settings
server.port=8080

# MySQL service name inside Docker Compose
spring.datasource.url=jdbc:mysql://mysql:3306/${DB_NAME:db_secure_auth}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep the schema behavior configurable, but default to update for local container runs
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}

# Actuator and readiness/liveness support for containers
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# Token and rate limit values still come from environment variables
security.jwt.secret=${JWT_SECRET:change-me-in-docker}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
rate-limit.auth.requests-per-minute=${RATE_LIMIT_AUTH_REQUESTS_PER_MINUTE:10}
rate-limit.api.requests-per-minute=${RATE_LIMIT_API_REQUESTS_PER_MINUTE:60}
